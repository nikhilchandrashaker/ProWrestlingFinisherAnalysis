<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G1 Climax — Tournament Analytics 1991–2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e10;
  --surface: #17171a;
  --surface2: #1f1f24;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #e8e8ec;
  --muted: #7a7a8a;
  --accent: #e8302a;
  --accent2: #ff6b35;
  --gold: #d4ac0d;
  --gold2: #f0cc40;
  --purple: #9b87e8;
  --green: #3dd68c;
  --blue: #5b9cf6;
  --teal: #2dd4bf;
  --dec-90s: #9b87e8;
  --dec-00s: #3dd68c;
  --dec-10s: #ff6b35;
  --dec-20s: #5b9cf6;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ─── HERO ─────────────────────────────── */
.hero {
  position: relative;
  overflow: hidden;
  padding: 64px 40px 48px;
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent,
    transparent 39px,
    rgba(255,255,255,0.022) 39px,
    rgba(255,255,255,0.022) 40px
  );
  pointer-events: none;
}
.hero-inner { max-width: 1100px; margin: 0 auto; position: relative; }
.hero-eyebrow {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.hero-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: clamp(56px, 9vw, 110px);
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -0.02em;
  text-transform: uppercase;
  color: var(--text);
}
.hero-title span { color: var(--accent); }
.hero-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-top: 10px;
}
.hero-stats {
  display: flex;
  gap: 32px;
  margin-top: 40px;
  flex-wrap: wrap;
}
.hero-stat { }
.hero-stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 38px;
  font-weight: 700;
  line-height: 1;
  color: var(--text);
}
.hero-stat-lbl {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}
.hero-divider { width: 1px; background: var(--border2); align-self: stretch; }

/* ─── LAYOUT ────────────────────────────── */
.shell { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

/* ─── TABS ──────────────────────────────── */
.tabs-wrap {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(14,14,16,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border2);
}
.tabs {
  display: flex;
  gap: 0;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
  overflow-x: auto;
}
.tab {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 16px 22px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: color .2s, border-color .2s;
  background: none;
  border-left: none;
  border-right: none;
  border-top: none;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--text); }
.tab[data-dec="all"].active { border-color: var(--gold); }
.tab[data-dec="1990s"].active { border-color: var(--dec-90s); }
.tab[data-dec="2000s"].active { border-color: var(--dec-00s); }
.tab[data-dec="2010s"].active { border-color: var(--dec-10s); }
.tab[data-dec="2020s"].active { border-color: var(--dec-20s); }
.tab[data-dec="records"].active { border-color: var(--blue); }

/* ─── DECADE HEADER ─────────────────────── */
.decade-header {
  padding: 36px 0 20px;
  display: none;
}
.decade-header.visible { display: block; }
.decade-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 56px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: -0.02em;
  line-height: 1;
}
.decade-desc {
  font-size: 13px;
  color: var(--muted);
  margin-top: 8px;
  letter-spacing: 0.04em;
}
.d90s { color: var(--dec-90s); }
.d00s { color: var(--dec-00s); }
.d10s { color: var(--dec-10s); }
.d20s { color: var(--dec-20s); }

/* ─── GRID ───────────────────────────────── */
.editions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  padding-bottom: 40px;
}

/* ─── EDITION CARD ──────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  transition: border-color .2s, transform .15s;
  cursor: pointer;
}
.card:hover { border-color: var(--border2); transform: translateY(-2px); }
.card.expanded { border-color: var(--border2); }

.card-header {
  display: flex;
  align-items: stretch;
  gap: 0;
}
.card-year {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 42px;
  font-weight: 900;
  line-height: 1;
  padding: 16px 18px;
  writing-mode: horizontal-tb;
  min-width: 84px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--border);
  letter-spacing: -0.02em;
}
.card[data-dec="1990s"] .card-year { color: var(--dec-90s); }
.card[data-dec="2000s"] .card-year { color: var(--dec-00s); }
.card[data-dec="2010s"] .card-year { color: var(--dec-10s); }
.card[data-dec="2020s"] .card-year { color: var(--dec-20s); }

.card-top {
  flex: 1;
  padding: 14px 16px;
}
.card-winner {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.1;
  color: var(--text);
}
.card-finalist {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 0.04em;
}
.card-finalist span { color: rgba(232,232,236,0.5); }
.card-badges {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.badge {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 3px;
  text-transform: uppercase;
}
.badge-gaijin { background: rgba(232,48,42,0.2); color: var(--accent2); }
.badge-backtoback { background: rgba(212,172,13,0.15); color: var(--gold2); }
.badge-champ { background: rgba(155,135,232,0.2); color: var(--purple); }
.badge-firsttime { background: rgba(61,214,140,0.15); color: var(--green); }
.badge-classic { background: rgba(91,156,246,0.15); color: var(--blue); }

.card-rating-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}
.rating-stars {
  display: flex;
  gap: 2px;
}
.star {
  width: 8px;
  height: 8px;
  border-radius: 1px;
}
.rating-val {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--gold2);
  font-weight: 700;
}
.rating-label {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.06em;
}
.cm-link {
  margin-left: auto;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  border: 1px solid var(--border2);
  padding: 3px 8px;
  border-radius: 3px;
  transition: color .15s, border-color .15s;
  font-family: 'Space Mono', monospace;
}
.cm-link:hover { color: var(--text); border-color: var(--border2); }

/* ─── EXPANDABLE DETAIL ─────────────────── */
.card-detail {
  display: none;
  border-top: 1px solid var(--border);
}
.card.expanded .card-detail { display: block; }

/* ─── BRACKET ───────────────────────────── */
.bracket-wrap {
  padding: 20px 20px 16px;
  background: linear-gradient(180deg, var(--surface2) 0%, var(--surface) 100%);
  border-bottom: 1px solid var(--border);
}
.bracket-title {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}
.bracket {
  display: flex;
  align-items: center;
  gap: 0;
  font-family: 'Barlow Condensed', sans-serif;
}
.b-col { display: flex; flex-direction: column; gap: 8px; }
.b-node {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 7px 12px;
  min-width: 130px;
  max-width: 170px;
}
.b-node-label {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2px;
  font-family: 'Space Mono', monospace;
}
.b-node-name {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.03em;
  line-height: 1.2;
  color: var(--text);
}
.b-node-extra {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}
.b-node.winner-node {
  border-color: var(--gold);
  background: rgba(212,172,13,0.06);
}
.b-node.winner-node .b-node-name { color: var(--gold2); }

.b-connectors {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 36px;
  position: relative;
  align-self: stretch;
}
.b-line-v {
  flex: 1;
  width: 1px;
  background: var(--border2);
  margin-left: 0;
}
.b-line-h {
  width: 36px;
  height: 1px;
  background: var(--border2);
}

.b-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.b-final-label {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  writing-mode: vertical-lr;
  padding: 0 4px;
  border: 1px solid rgba(232,48,42,0.3);
  border-radius: 2px;
  white-space: nowrap;
}
.b-arrow {
  color: var(--border2);
  font-size: 18px;
}

/* ─── ROUTE INFO ────────────────────────── */
.route-info {
  padding: 16px 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.route-section { }
.route-section-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}
.route-section-text {
  font-size: 13px;
  color: rgba(232,232,236,0.85);
  line-height: 1.55;
}
.route-section.full-width { grid-column: 1/-1; }

/* Notable match */
.notable-match {
  margin: 0 20px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.nm-icon {
  font-size: 14px;
  margin-top: 1px;
  flex-shrink: 0;
  color: var(--gold);
}
.nm-text { }
.nm-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 2px;
}
.nm-match {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  font-family: 'Barlow Condensed', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.nm-detail {
  font-size: 12px;
  color: var(--muted);
  margin-top: 1px;
}

/* ─── RECORDS PAGE ──────────────────────── */
.records-page { padding: 36px 0 60px; display: none; }
.records-page.visible { display: block; }
.rec-section { margin-bottom: 40px; }
.rec-section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text);
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border2);
}
.leaderboard { }
.lb-row {
  display: grid;
  grid-template-columns: 32px 1fr auto 2fr;
  gap: 12px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.lb-row:last-child { border-bottom: none; }
.lb-rank {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-align: right;
}
.lb-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.lb-wins {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 900;
  text-align: center;
  min-width: 40px;
}
.lb-wins.top1 { color: var(--gold2); }
.lb-wins.top2 { color: var(--accent2); }
.lb-wins.top3 { color: var(--purple); }
.lb-years {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.yr-chip {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid;
}
.yr-chip[data-dec="1990s"] { border-color: var(--dec-90s); color: var(--dec-90s); background: rgba(155,135,232,0.1); }
.yr-chip[data-dec="2000s"] { border-color: var(--dec-00s); color: var(--dec-00s); background: rgba(61,214,140,0.1); }
.yr-chip[data-dec="2010s"] { border-color: var(--dec-10s); color: var(--dec-10s); background: rgba(255,107,53,0.1); }
.yr-chip[data-dec="2020s"] { border-color: var(--dec-20s); color: var(--dec-20s); background: rgba(91,156,246,0.1); }

.rec-table { width: 100%; border-collapse: collapse; }
.rec-table tr { border-bottom: 1px solid var(--border); }
.rec-table tr:last-child { border-bottom: none; }
.rec-table td { padding: 9px 0; vertical-align: top; }
.rec-table td:first-child {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  width: 200px;
  padding-right: 20px;
}
.rec-table td:last-child { font-size: 13px; color: var(--text); }

/* Cagematch ratings chart */
.ratings-chart { margin: 20px 0; }
.rc-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.rc-year {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  width: 40px;
  text-align: right;
}
.rc-bar-wrap {
  flex: 1;
  height: 18px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.rc-bar {
  height: 100%;
  border-radius: 2px;
  transition: width .4s;
}
.rc-val {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text);
  width: 40px;
}
.rc-cm {
  font-size: 10px;
  color: var(--muted);
  text-decoration: none;
}
.rc-cm:hover { color: var(--blue); }

/* All editions panel */
.all-editions-wrap { padding: 36px 0 60px; display: none; }
.all-editions-wrap.visible { display: block; }

/* fade in */
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.decade-section { animation: fadeIn .3s ease; }
</style>
</head>

    <div class="hero-title">G<span>1</span><br>CLIMAX</div>
    <div class="hero-sub">Complete Tournament History 1991 – 2025</div>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-val">35</div>
        <div class="hero-stat-lbl">Editions</div>

<div class="tabs-wrap">

<div class="shell">

<div id="main-grid"><!-- injected by JS --></div>

    <div class="rec-section-title">Tournament Records</div>

</div>

// Wins map
const wins = {};
TOURNAMENTS.forEach(t => wins[t.winner] = (wins[t.winner]||0)+1);

// Dec year map
const decOf = {};
TOURNAMENTS.forEach(t => decOf[t.y] = t.d);

function ratingColor(r) {
  if (!r) return '#7a7a8a';
  if (r >= 9.5) return '#f0cc40';
  if (r >= 8.5) return '#3dd68c';
  if (r >= 7.5) return '#5b9cf6';
  if (r >= 6.5) return '#ff6b35';
  return '#e8302a';
}

function ratingBarColor(r) {
  if (!r) return '#333';
  if (r >= 9) return '#f0cc40';
  if (r >= 8) return '#3dd68c';
  if (r >= 7) return '#5b9cf6';
  return '#ff6b35';
}

function starsHTML(rating) {
  if (!rating) return '';
  const filled = Math.round(rating);
  let h = '';
  for (let i=0;i<10;i++) {
    h += `<div class="star" style="background:${i < filled ? ratingColor(rating) : '#2a2a2e'}"></div>`;
  }
  return h;
}

function makeBracket(t) {
  return `
  <div class="bracket-wrap">
    <div class="bracket-title">Path to the Final</div>
    <div class="bracket">
      <div class="b-col">
        <div class="b-node">
          <div class="b-node-label">${t.blockA.label}</div>
          <div class="b-node-name">${t.blockA.name}</div>
          ${t.blockA.extra ? `<div class="b-node-extra">${t.blockA.extra}</div>` : ''}
        </div>
        <div class="b-node">
          <div class="b-node-label">${t.blockB.label}</div>
          <div class="b-node-name">${t.blockB.name}</div>
          ${t.blockB.extra ? `<div class="b-node-extra">${t.blockB.extra}</div>` : ''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;width:40px;align-self:stretch;">
        <div style="flex:1;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-end;">
          <div style="width:40px;height:1px;background:var(--border2);"></div>
          <div style="width:1px;height:50%;background:var(--border2);align-self:flex-end;"></div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;">
          <div style="width:1px;height:50%;background:var(--border2);align-self:flex-end;"></div>
          <div style="width:40px;height:1px;background:var(--border2);"></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 6px;">
        <div class="b-final-label">Final</div>
      </div>
      <div style="display:flex;align-items:center;color:var(--border2);font-size:18px;padding:0 4px;">→</div>
      <div class="b-node winner-node">
        <div class="b-node-label">Winner</div>
        <div class="b-node-name">${t.winner}</div>
        <div class="b-node-extra">def. ${t.finalist}</div>
      </div>
    </div>
  </div>`;
}

function makeCard(t) {
  const badgesHTML = (t.badges||[]).map(b => {
    const map = {
      gaijin:'<span class="badge badge-gaijin">First Gaijin</span>',
      backtoback:'<span class="badge badge-backtoback">Back-to-Back</span>',
      champ:'<span class="badge badge-champ">Reigning Champ Won</span>',
      firsttime:'<span class="badge badge-firsttime">First-Time Winner</span>',
      classic:'<span class="badge badge-classic">Classic Final</span>',
    };
    return map[b]||'';
  }).join('');

  const ratingHTML = t.cmRating
    ? `<div class="rating-stars">${starsHTML(t.cmRating)}</div>
       <span class="rating-val">${t.cmRating.toFixed(2)}</span>
       <span class="rating-label">CAGEMATCH</span>`
    : `<span class="rating-label" style="opacity:.4">No Cagematch rating found</span>`;

  const cmLinkHTML = t.cm
    ? `<a href="${t.cm}" target="_blank" class="cm-link">→ Cagematch</a>`
    : '';

  const div = document.createElement('div');
  div.className = 'card';
  div.setAttribute('data-dec', t.d);
  div.setAttribute('data-year', t.y);
  div.innerHTML = `
    <div class="card-header" onclick="toggleCard(${t.y})">
      <div class="card-year">${t.y}</div>
      <div class="card-top">
        <div class="card-winner">${t.winner}</div>
        <div class="card-finalist"><span>def.</span> ${t.finalist}</div>
        <div class="card-badges">${badgesHTML}</div>
      </div>
    </div>
    <div class="card-rating-row">
      ${ratingHTML}
      ${cmLinkHTML}
    </div>
    <div class="card-detail">
      ${makeBracket(t)}
      <div class="route-info">
        <div class="route-section">
          <div class="route-section-label">Format</div>
          <div class="route-section-text">${t.format}</div>
        </div>
        <div class="route-section">
          <div class="route-section-label">The Final</div>
          <div class="route-section-text">${t.finalNote}</div>
        </div>
        <div class="route-section">
          <div class="route-section-label">${t.blockA.label} route</div>
          <div class="route-section-text">${t.routeA}</div>
        </div>
        <div class="route-section">
          <div class="route-section-label">${t.blockB.label} route</div>
          <div class="route-section-text">${t.routeB}</div>
        </div>
        <div class="route-section full-width">
          <div class="route-section-label">Why it matters</div>
          <div class="route-section-text">${t.significance}</div>
        </div>
      </div>
      <div class="notable-match">
        <div class="nm-icon">★</div>
        <div class="nm-text">
          <div class="nm-label">Notable match</div>
          <div class="nm-match">${t.notable}</div>
          <div class="nm-detail">${t.notableDetail}</div>
        </div>
      </div>
    </div>`;
  return div;
}

let currentDec = 'all';
let expandedYear = null;

function toggleCard(year) {
  const card = document.querySelector(`.card[data-year="${year}"]`);
  if (!card) return;
  const wasExpanded = card.classList.contains('expanded');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded) {
    card.classList.add('expanded');
    expandedYear = year;
    setTimeout(() => card.scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
  } else {
    expandedYear = null;
  }
}

function showDec(dec) {
  currentDec = dec;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.dec === dec));
  document.getElementById('main-grid').style.display = dec === 'records' ? 'none' : 'block';
  document.getElementById('records-page').classList.toggle('visible', dec === 'records');

  if (dec === 'records') return;

  const grid = document.getElementById('main-grid');
  grid.innerHTML = '';

  const decades = dec === 'all' ? ['1990s','2000s','2010s','2020s'] : [dec];
  const decLabels = {
    '1990s': { label: '1990s', cls: 'd90s', desc: 'The Founding Era · The Three Musketeers · Chono\'s Dynasty (9 tournaments)' },
    '2000s': { label: '2000s', cls: 'd00s', desc: 'The Transition Era · Tenzan\'s Rise · Tanahashi\'s Arrival (10 tournaments)' },
    '2010s': { label: '2010s', cls: 'd10s', desc: 'The Global Boom · Okada vs. Tanahashi · The Gaijin Breakthrough (10 tournaments)' },
    '2020s': { label: '2020s', cls: 'd20s', desc: 'The New Guard · Post-Pandemic · A Second Gaijin Champion (6 tournaments so far)' },
  };

  decades.forEach(d => {
    const section = document.createElement('div');
    section.className = 'decade-section';

    const hdr = document.createElement('div');
    hdr.className = 'decade-header visible';
    const info = decLabels[d];
    hdr.innerHTML = `<div class="decade-label ${info.cls}">${info.label}</div><div class="decade-desc">${info.desc}</div>`;
    section.appendChild(hdr);

    const g = document.createElement('div');
    g.className = 'editions-grid';
    TOURNAMENTS.filter(t => t.d === d).forEach(t => g.appendChild(makeCard(t)));
    section.appendChild(g);
    grid.appendChild(section);
  });
}

// Leaderboard
function buildLeaderboard() {
  const sorted = Object.entries(wins).sort((a,b) => b[1]-a[1] || a[0].localeCompare(b[0]));
  const el = document.getElementById('leaderboard');
  sorted.forEach(([name, w], i) => {
    const yrs = TOURNAMENTS.filter(t=>t.winner===name).map(t=>({y:t.y,d:t.d}));
    const yrsHTML = yrs.map(({y,d}) => `<span class="yr-chip" data-dec="${d}">${y}</span>`).join('');
    const wClass = i===0 ? 'top1' : i===1 ? 'top2' : i===2 ? 'top3' : '';
    el.innerHTML += `<div class="lb-row">
      <div class="lb-rank">${i+1}</div>
      <div class="lb-name">${name}</div>
      <div class="lb-wins ${wClass}">${w}</div>
      <div class="lb-years">${yrsHTML}</div>
    </div>`;
  });
}

// Ratings chart
function buildRatingsChart() {
  const rated = TOURNAMENTS.filter(t => t.cmRating).sort((a,b)=>a.y-b.y);
  const max = 10;
  let html = '';
  rated.forEach(t => {
    const pct = Math.round((t.cmRating / max) * 100);
    const cmHtml = t.cm ? `<a href="${t.cm}" target="_blank" class="rc-cm">↗</a>` : '';
    html += `<div class="rc-row">
      <div class="rc-year">${t.y}</div>
      <div class="rc-bar-wrap">
        <div class="rc-bar" style="width:${pct}%;background:${ratingBarColor(t.cmRating)};"></div>
      </div>
      <div class="rc-val" style="color:${ratingColor(t.cmRating)}">${t.cmRating.toFixed(2)}</div>
      ${cmHtml}
    </div>`;
  });
  document.getElementById('ratings-chart').innerHTML = html;
}

buildLeaderboard();
buildRatingsChart();
buildRecords();
showDec('all');
</script>
